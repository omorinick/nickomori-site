// ─── Font loader ─────────────────────────────────────────────────────────────

function useGoogleFont(googlePath) {
  useEffect(() => {
    if (!googlePath) return;
    const id = `gf-${googlePath.replace(/[^a-z0-9]/gi, '')}`;
    if (document.getElementById(id)) return;
    const link = document.createElement('link');
    link.id = id;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${googlePath}&display=swap`;
    document.head.appendChild(link);
  }, [googlePath]);
}

// ─── Utilities ───────────────────────────────────────────────────────────────

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// ─── Color row ───────────────────────────────────────────────────────────────

function ColorRow({ label, value, onChange }) {
  const [hex, setHex] = useState(value);
  useEffect(() => setHex(value), [value]);

  const handleHex = (e) => {
    const v = e.target.value;
    setHex(v);
    if (/^#[0-9a-fA-F]{6}$/.test(v)) onChange(v);
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid #1e1e1e' }}>
      <span style={{ fontSize: '11px', color: '#666', flex: 1 }}>{label}</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
        <input
          type="text"
          value={hex}
          onChange={handleHex}
          maxLength={7}
          style={{ width: '72px', fontSize: '11px', padding: '3px 6px', border: '1px solid #2a2a2a', borderRadius: '4px', background: '#111', color: '#ccc', fontFamily: 'monospace' }}
        />
        <div style={{ position: 'relative', width: '24px', height: '24px', borderRadius: '5px', overflow: 'hidden', border: '1px solid #333', flexShrink: 0, backgroundColor: value }}>
          <input
            type="color"
            value={value}
            onChange={(e) => { onChange(e.target.value); setHex(e.target.value); }}
            style={{ position: 'absolute', width: '300%', height: '300%', top: '-100%', left: '-100%', opacity: 0, cursor: 'pointer' }}
          />
          <div style={{ position: 'absolute', inset: 0, cursor: 'pointer' }} onClick={() => {}} />
        </div>
      </div>
    </div>
  );
}

// ─── Magnetic card wrapper ────────────────────────────────────────────────────

function MagneticCard({ style, children, enabled }) {
  const ref = useRef(null);
  const [delta, setDelta] = useState({ x: 0, y: 0 });
  return (
    <div
      ref={ref}
      style={{ ...style, transform: `translate(${delta.x}px, ${delta.y}px)`, transition: 'transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94)' }}
      onMouseMove={(e) => {
        if (!enabled || !ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        setDelta({
          x: (e.clientX - (rect.left + rect.width / 2)) * 0.1,
          y: (e.clientY - (rect.top + rect.height / 2)) * 0.1,
        });
      }}
      onMouseLeave={() => setDelta({ x: 0, y: 0 })}
    >
      {children}
    </div>
  );
}

// ─── Custom cursor ────────────────────────────────────────────────────────────

function CustomCursor({ accent, mousePos }) {
  const ringRef = useRef(null);
  const ringPos = useRef({ x: mousePos.x, y: mousePos.y });

  useEffect(() => {
    let raf;
    const animate = () => {
      ringPos.current.x += (mousePos.x - ringPos.current.x) * 0.14;
      ringPos.current.y += (mousePos.y - ringPos.current.y) * 0.14;
      if (ringRef.current) {
        ringRef.current.style.left = `${ringPos.current.x}px`;
        ringRef.current.style.top = `${ringPos.current.y}px`;
      }
      raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, [mousePos]);

  const visible = mousePos.x > -900;

  return (
    <>
      {/* Lagging ring */}
      <div
        ref={ringRef}
        style={{
          position: 'fixed',
          width: 28,
          height: 28,
          borderRadius: '50%',
          border: `1.5px solid ${accent}`,
          opacity: visible ? 0.5 : 0,
          transform: 'translate(-50%, -50%)',
          pointerEvents: 'none',
          zIndex: 9999,
          left: mousePos.x,
          top: mousePos.y,
        }}
      />
      {/* Precise dot */}
      <div
        style={{
          position: 'fixed',
          left: mousePos.x,
          top: mousePos.y,
          width: 8,
          height: 8,
          borderRadius: '50%',
          background: accent,
          opacity: visible ? 1 : 0,
          transform: 'translate(-50%, -50%)',
          pointerEvents: 'none',
          zIndex: 9999,
        }}
      />
    </>
  );
}

              <button style={{ ...primaryBtn, padding: '9px 18px', borderRadius: '7px', fontSize: '13px', fontWeight: 600, fontFamily: bFont.family, cursor: 'pointer' }}>Primary</button>
              <button style={{ ...ghostBtn, padding: '8px 18px', borderRadius: '7px', fontSize: '13px', fontWeight: 500, fontFamily: bFont.family, cursor: 'pointer' }}>Ghost</button>
              <button style={{ background: 'none', color: p.accent, border: 'none', fontSize: '13px', fontFamily: bFont.family, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '3px' }}>Link</button>
            </div>
          </div>

          {/* Form */}
          <div style={{ ...card, borderRadius: '12px', padding: '24px' }}>
            <p style={{ fontSize: '10px', color: p.fgSubtle, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '16px' }}>Form elements</p>
            <div style={{ marginBottom: '10px' }}>
              <label style={{ fontSize: '12px', color: p.fgMuted, display: 'block', marginBottom: '5px' }}>Email</label>
              <input readOnly style={{ width: '100%', padding: '8px 11px', border: `1px solid ${p.border}`, borderRadius: '7px', background: p.bg, color: p.fg, fontFamily: bFont.family, fontSize: '13px', outline: 'none' }} placeholder="you@example.com" />
            </div>
            <div style={{ marginBottom: '14px' }}>
              <label style={{ fontSize: '12px', color: p.fgMuted, display: 'block', marginBottom: '5px' }}>Message</label>
              <textarea readOnly style={{ width: '100%', padding: '8px 11px', border: `1px solid ${p.border}`, borderRadius: '7px', background: p.bg, color: p.fg, fontFamily: bFont.family, fontSize: '13px', resize: 'none', height: '62px', outline: 'none' }} placeholder="Say something..." />
            </div>
            <button style={{ ...primaryBtn, width: '100%', padding: '9px', borderRadius: '7px', fontSize: '13px', fontWeight: 600, fontFamily: bFont.family, cursor: 'pointer' }}>Send →</button>
          </div>
        </div>

        {/* Blockquote */}
        <div style={{ borderLeft: `3px solid ${p.accent}`, paddingLeft: '22px', marginBottom: '56px' }}>
          <p style={{ fontFamily: hFont.family, fontSize: '20px', lineHeight: 1.55, color: p.fg, marginBottom: '10px' }}>
            "The faster we make our ideas tangible, the sooner we can evaluate them, refine them, and zero in on the best solution."
          </p>
          <p style={{ fontSize: '13px', color: p.fgMuted }}>— Tim Brown, Change by Design</p>
        </div>

        {/* Modal sample */}
        <div style={{ ...card, borderRadius: '16px', padding: '28px', marginBottom: '56px', boxShadow: `0 8px 32px rgba(0,0,0,0.15)` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '14px' }}>
            <span style={{ fontSize: '11px', fontWeight: 700, padding: '3px 8px', borderRadius: '4px', background: p.accent, color: p.accentFg }}>✓ VERIFIED</span>
            <span style={{ fontFamily: hFont.family, fontSize: '16px', fontWeight: 600, color: p.fg }}>Modal panel</span>
          </div>
          <p style={{ fontSize: '14px', lineHeight: 1.65, color: p.fg, marginBottom: '8px' }}>Modal body text uses primary foreground — not muted — because it's the main content, not supporting detail.</p>
          <p style={{ fontSize: '13px', lineHeight: 1.6, color: p.fgMuted }}>Secondary context drops to muted. This is where the contrast between the two text levels is most apparent.</p>
          <button style={{ marginTop: '18px', fontSize: '12px', color: p.fgMuted, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '2px', fontFamily: bFont.family }}>Close</button>
        </div>

      </div>

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${p.border}`, padding: '22px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', maxWidth: '760px', margin: '0 auto' }}>
        <span style={{ fontSize: '12px', color: p.fgMuted }}>© 2026 Nick Omori</span>
        <div style={{ display: 'flex', gap: '20px' }}>
          {['LinkedIn', 'GitHub', 'Vault'].map(l => (
            <span key={l} style={{ fontSize: '12px', color: p.accent, cursor: 'pointer' }}>{l}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Main app ─────────────────────────────────────────────────────────────────

const COLOR_FIELDS = [
  { key: 'bg',            label: 'Background' },
  { key: 'bgCard',        label: 'Card surface' },
  { key: 'bgSecondary',   label: 'Secondary / input bg' },
  { key: 'fg',            label: 'Text — primary' },
  { key: 'fgMuted',       label: 'Text — muted' },
  { key: 'fgSubtle',      label: 'Text — subtle' },
  { key: 'border',        label: 'Border' },
  { key: 'borderHover',   label: 'Border hover' },
  { key: 'accent',        label: 'Accent' },
  { key: 'accentFg',      label: 'Accent foreground' },
  { key: 'accentSubtle',  label: 'Accent subtle bg' },
];

function App() {
  const [templateId, setTemplateId] = useState('warm-editorial');
  const [isDark, setIsDark] = useState(false);
  const [palette, setPalette] = useState(TEMPLATES[0].light);
  const [headingFontId, setHeadingFontId] = useState('cormorant');
  const [bodyFontId, setBodyFontId] = useState('inter');
  const [copied, setCopied] = useState(false);
  const [colorsOpen, setColorsOpen] = useState(false);
  const [mouseEffect, setMouseEffect] = useState('none');
  const [mousePos, setMousePos] = useState({ x: -999, y: -999 });

  const template = TEMPLATES.find(t => t.id === templateId);
  const headingFont = HEADING_FONTS.find(f => f.id === headingFontId);
  const bodyFont = BODY_FONTS.find(f => f.id === bodyFontId);

  useGoogleFont(headingFont?.google);
  useGoogleFont(bodyFont?.google);

  const selectTemplate = (t) => {
    setTemplateId(t.id);
    setPalette(isDark ? t.dark : t.light);
  };

  const toggleDark = () => {
    const next = !isDark;
    setIsDark(next);
    setPalette(next ? template.dark : template.light);
  };

  const updateColor = (key, val) => setPalette(p => ({ ...p, [key]: val }));

  const CSS_VAR_MAP = {
    bg: '--background',
    bgCard: '--card',
    bgSecondary: '--secondary',
    fg: '--foreground',
    fgMuted: '--muted-foreground',
    fgSubtle: '--foreground-subtle',
    border: '--border',
    borderHover: '--border-hover',
    accent: '--primary',
    accentFg: '--primary-foreground',
    accentSubtle: '--accent-subtle',
  };

  const exportCSS = () => {
    const block = isDark ? '.dark' : ':root';
    const lines = Object.entries(CSS_VAR_MAP).map(([key, varName]) => `  ${varName}: ${palette[key]};`);
    const fontLine = `  /* Heading: ${headingFont.name} — Body: ${bodyFont.name} */`;
    const output = `/* ${template.name} — ${isDark ? 'Dark' : 'Light'} */\n${block} {\n${fontLine}\n${lines.join('\n')}\n}`;
    navigator.clipboard.writeText(output).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const sidebarStyle = { background: '#141414', color: '#d0d0d0', display: 'flex', flexDirection: 'column', height: '100vh', overflowY: 'auto' };
  const sectionLabel = { fontSize: '10px', color: '#555', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '10px', display: 'block' };
  const selectStyle = { width: '100%', padding: '7px 10px', borderRadius: '7px', border: '1px solid #2a2a2a', background: '#1a1a1a', color: '#d0d0d0', fontSize: '12px', cursor: 'pointer', outline: 'none' };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>

      {/* ── Sidebar ── */}
      <div style={{ width: '288px', flexShrink: 0, ...sidebarStyle }}>

        {/* Header */}
        <div style={{ padding: '16px 18px 14px', borderBottom: '1px solid #222' }}>
          <div style={{ fontSize: '13px', fontWeight: 600, color: '#fff', marginBottom: '1px' }}>Theme Playground</div>
          <div style={{ fontSize: '11px', color: '#555' }}>nickomori.com</div>
        </div>

        <div style={{ flex: 1, padding: '16px 18px', overflowY: 'auto' }}>

          {/* Mode toggle */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
            <span style={{ fontSize: '12px', color: '#666' }}>Mode</span>
            <button onClick={toggleDark} style={{ fontSize: '11px', padding: '5px 14px', borderRadius: '99px', border: '1px solid #2e2e2e', background: isDark ? '#e0e0e0' : '#2a2a2a', color: isDark ? '#111' : '#d0d0d0', cursor: 'pointer', fontWeight: 500 }}>
              {isDark ? '☀ Light' : '◑ Dark'}
            </button>
          </div>

          {/* Palettes */}
          <div style={{ marginBottom: '22px' }}>
            <span style={sectionLabel}>Palettes</span>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
              {TEMPLATES.map(t => {
                const isActive = templateId === t.id;
                return (
                  <button
                    key={t.id}
                    onClick={() => selectTemplate(t)}
                    style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 10px', borderRadius: '8px', border: `1px solid ${isActive ? '#444' : '#1e1e1e'}`, background: isActive ? '#222' : 'transparent', cursor: 'pointer', textAlign: 'left', transition: 'all 0.1s' }}
                  >
                    <div style={{ display: 'flex', gap: '3px', flexShrink: 0 }}>
                      {t.swatches.map((c, i) => (
                        <div key={i} style={{ width: '12px', height: '12px', borderRadius: '50%', backgroundColor: c, border: '1px solid rgba(255,255,255,0.08)' }} />
                      ))}
                    </div>
                    <div>
                      <div style={{ fontSize: '12px', color: isActive ? '#fff' : '#aaa', fontWeight: isActive ? 500 : 400 }}>{t.name}</div>
                      <div style={{ fontSize: '10px', color: '#555' }}>{t.desc}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Colors */}
          <div style={{ marginBottom: '22px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px', cursor: 'pointer' }} onClick={() => setColorsOpen(o => !o)}>
              <span style={sectionLabel}>Colors</span>
              <span style={{ fontSize: '11px', color: '#555', marginBottom: '10px' }}>{colorsOpen ? '▲' : '▼'}</span>
            </div>
            {colorsOpen && (
              <div style={{ background: '#0e0e0e', borderRadius: '8px', padding: '4px 12px 2px' }}>
                {COLOR_FIELDS.map(({ key, label }) => (
                  <ColorRow key={key} label={label} value={palette[key]} onChange={(v) => updateColor(key, v)} />
                ))}
              </div>
            )}
            {!colorsOpen && (
              <div style={{ display: 'flex', gap: '5px', flexWrap: 'wrap' }}>
                {COLOR_FIELDS.map(({ key }) => (
                  <div key={key} style={{ width: '22px', height: '22px', borderRadius: '5px', backgroundColor: palette[key], border: '1px solid rgba(255,255,255,0.06)', cursor: 'pointer' }} title={key} onClick={() => setColorsOpen(true)} />
                ))}
              </div>
            )}
          </div>

          {/* Fonts */}
          <div style={{ marginBottom: '22px' }}>
            <span style={sectionLabel}>Fonts</span>
            <div style={{ background: '#0e0e0e', borderRadius: '8px', padding: '12px' }}>
              <div style={{ marginBottom: '12px' }}>
                <label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '5px' }}>Heading</label>
                <select value={headingFontId} onChange={e => setHeadingFontId(e.target.value)} style={selectStyle}>
                  {HEADING_FONTS.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                </select>
                <div style={{ fontSize: '13px', color: '#555', marginTop: '5px', fontFamily: headingFont?.family, lineHeight: 1.2 }}>
                  Big heading text.
                </div>
              </div>
              <div>
                <label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '5px' }}>Body</label>
                <select value={bodyFontId} onChange={e => setBodyFontId(e.target.value)} style={selectStyle}>
                  {BODY_FONTS.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                </select>
                <div style={{ fontSize: '12px', color: '#555', marginTop: '5px', fontFamily: bodyFont?.family }}>
                  Body text reads like this.
                </div>
              </div>
            </div>
          </div>

          {/* Mouse Effects */}
          <div style={{ marginBottom: '22px' }}>
            <span style={sectionLabel}>Mouse Effects</span>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {MOUSE_EFFECTS.map(effect => {
                const isActive = mouseEffect === effect.id;
                return (
                  <button
                    key={effect.id}
                    onClick={() => setMouseEffect(effect.id)}
                    style={{
                      display: 'flex', flexDirection: 'column', alignItems: 'flex-start',
                      padding: '8px 10px', borderRadius: '8px', textAlign: 'left', cursor: 'pointer',
                      border: `1px solid ${isActive ? '#444' : '#1e1e1e'}`,
                      background: isActive ? '#222' : 'transparent',
                      transition: 'all 0.1s',
                    }}
                  >
                    <span style={{ fontSize: '12px', color: isActive ? '#fff' : '#aaa', fontWeight: isActive ? 500 : 400 }}>{effect.label}</span>
                    <span style={{ fontSize: '10px', color: '#555', marginTop: '1px' }}>{effect.desc}</span>
                  </button>
                );
              })}
            </div>
            {mouseEffect !== 'none' && (
              <p style={{ fontSize: '10px', color: '#444', marginTop: '8px', lineHeight: 1.5 }}>
                Move your cursor over the preview →
              </p>
            )}
          </div>

        </div>

        {/* Export */}
        <div style={{ padding: '14px 18px', borderTop: '1px solid #1e1e1e' }}>
          <button
            onClick={exportCSS}
            style={{ width: '100%', padding: '10px', borderRadius: '8px', border: `1px solid ${copied ? '#3a5a3a' : '#2e2e2e'}`, background: copied ? '#1e3a1e' : '#1e1e1e', color: copied ? '#6ddc6d' : '#d0d0d0', fontSize: '12px', fontWeight: 500, cursor: 'pointer', transition: 'all 0.2s' }}
          >
            {copied ? '✓ Copied to clipboard' : '⬇ Export CSS variables'}
          </button>
          <div style={{ fontSize: '10px', color: '#3a3a3a', marginTop: '6px', textAlign: 'center' }}>
            Paste into globals.css {isDark ? '.dark' : ':root'} block
          </div>
        </div>
      </div>

      {/* ── Preview ── */}
      <div
        style={{ flex: 1, overflowY: 'auto', background: '#0a0a0a', cursor: mouseEffect === 'cursor' ? 'none' : 'auto' }}
        onMouseMove={(e) => setMousePos({ x: e.clientX, y: e.clientY })}
        onMouseLeave={() => setMousePos({ x: -999, y: -999 })}
      >
        <PreviewSite p={palette} hFont={headingFont} bFont={bodyFont} mouseEffect={mouseEffect} mousePos={mousePos} />
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
