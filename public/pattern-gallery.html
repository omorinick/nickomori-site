<!DOCTYPE html>
<!--
  Living Prototype — Pattern Storybook.
  The browsable menu of tried-and-true interaction patterns. Every pattern below is running live.
  This file is also the SOURCE: to use a pattern, copy its component from the <script> block.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Living Prototype — Pattern Storybook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { accent:'#1a3fcf', accentMid:'#0090ff', accentLight:'#6ec6ff' },
    fontFamily: { sans:['Inter','system-ui','-apple-system','Segoe UI','sans-serif'] },
  } } };
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap');
  body { font-family:'Inter',system-ui,sans-serif; background:#fafafa; color:#000; }
  .display { font-weight:900; letter-spacing:-0.04em; line-height:0.95; }
  .heading { font-weight:800; letter-spacing:-0.02em; line-height:1.05; }
  .kicker { font-weight:600; letter-spacing:0.16em; text-transform:uppercase; font-size:0.72rem; }
  .rib-scroll { scrollbar-width:none; } .rib-scroll::-webkit-scrollbar { display:none; }
  @keyframes slidein { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }
  input[type=range].lever { -webkit-appearance:none; appearance:none; height:6px; border-radius:999px; background:#e5e5e5; }
  input[type=range].lever::-webkit-slider-thumb { -webkit-appearance:none; width:26px; height:26px; border-radius:999px; background:#1a3fcf; cursor:pointer; border:4px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.2); }
  input[type=range].lever::-moz-range-thumb { width:26px; height:26px; border-radius:999px; background:#1a3fcf; cursor:pointer; border:4px solid #fff; }
</style>
</head>
<body>
<!-- Back bar: lives above the gallery in DOM; hidden on load via JS, revealed on scroll-up -->
<div style="height:44px;display:flex;align-items:center;padding:0 24px;background:#f0ebe0;border-bottom:1px solid #ddd5c4;">
  <a href="/projects" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;font-family:'Inter',system-ui,sans-serif;color:#7a6e64;text-decoration:none;" onmouseover="this.style.color='#1c1815'" onmouseout="this.style.color='#7a6e64'">
    ← Back to Constructive Distractions
  </a>
</div>
<script>window.scrollTo({ top: 44, behavior: 'instant' });</script>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Generic adoption-vs-retention cliff (shape is the point, numbers are illustrative)
const ADOPTION = [
  {label:'1', value:18.4}, {label:'2', value:7.2}, {label:'3', value:3.1},
  {label:'4', value:1.4}, {label:'5', value:0.7}, {label:'6', value:0.3}, {label:'7', value:0.0},
];

// Generic monthly trend
const TREND = [
  {label:'Jan', value:41}, {label:'Feb', value:37}, {label:'Mar', value:43},
  {label:'Apr', value:49}, {label:'May', value:55}, {label:'Jun', value:61},
  {label:'Jul', value:67}, {label:'Aug', value:74},
];

/* ---------- shared primitives ---------- */
function CountUpOnMount({ end, decimals=0, prefix='', suffix='' }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let raf; const t0 = performance.now();
    const tick = (t) => { const p = Math.min((t-t0)/1400,1); setV(end*(1-Math.pow(1-p,3))); if (p<1) raf=requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick); return () => cancelAnimationFrame(raf);
  }, [end]);
  return <span>{prefix}{v.toFixed(decimals)}{suffix}</span>;
}

function ReplayBtn({ onClick }) {
  return <button onClick={onClick} className="mt-4 text-sm font-semibold text-accent hover:underline">↺ Replay</button>;
}

/* ---------- PATTERN COMPONENTS (copy these) ---------- */

// Metric reveal
function MetricReveal({ end, decimals, prefix, suffix }) {
  return <p className="display text-7xl text-accent"><CountUpOnMount end={end} decimals={decimals} prefix={prefix} suffix={suffix} /></p>;
}

// Animated bar chart (bars draw in on mount)
function AnimatedChart({ data, max, highlightIndex, valueSuffix='%' }) {
  const [on, setOn] = useState(false);
  useEffect(() => { const t = setTimeout(() => setOn(true), 60); return () => clearTimeout(t); }, []);
  return (
    <div className="flex items-end gap-3 h-56">
      {data.map((d, i) => (
        <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
          <span className="text-xs font-bold mb-1 text-neutral-700" style={{ opacity: on?1:0, transition:'opacity .8s .6s' }}>{d.value}{valueSuffix}</span>
          <div className="w-full rounded-t-md" style={{ height: on?`${(d.value/max)*100}%`:'0%', background: i===highlightIndex?'#1a3fcf':'#cbd5e1', transition:'height 1s ease-out' }} />
          <span className="text-[11px] mt-2 text-neutral-500">{d.label}</span>
        </div>
      ))}
    </div>
  );
}

// Line chart (draws left-to-right on mount, with area fill)
function LineChart({ data, label }) {
  const [progress, setProgress] = useState(0);
  const uid = useRef('lc-' + Math.random().toString(36).slice(2));
  useEffect(() => {
    let raf; const t0 = performance.now();
    const tick = (t) => {
      const p = Math.min((t-t0)/1400,1);
      setProgress(1 - Math.pow(1-p, 3));
      if (p<1) raf=requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  const W=400, H=140, PX=24, PY=16;
  const maxV = Math.max(...data.map(d=>d.value));
  const minV = Math.min(...data.map(d=>d.value));
  const range = (maxV-minV)||1;
  const pts = data.map((d,i)=>[
    PX + (i/(data.length-1))*(W-PX*2),
    H - PY - ((d.value-minV)/range)*(H-PY*2)
  ]);
  const linePath = pts.map(([x,y],i)=>`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const areaPath = linePath+` L${pts[pts.length-1][0].toFixed(1)},${H-PY} L${pts[0][0].toFixed(1)},${H-PY} Z`;
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:140}}>
        <defs>
          <clipPath id={uid.current}>
            <rect x="0" y="0" width={progress*W} height={H} />
          </clipPath>
        </defs>
        <path d={areaPath} fill="#1a3fcf" fillOpacity="0.08" clipPath={`url(#${uid.current})`} />
        <path d={linePath} fill="none" stroke="#1a3fcf" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" clipPath={`url(#${uid.current})`} />
        {pts.map(([x,y],i)=>(
          <circle key={i} cx={x} cy={y} r="3.5" fill="#1a3fcf"
            style={{opacity: progress > (i/(pts.length-1))*0.9 ? 1 : 0, transition:'opacity .2s'}} />
        ))}
      </svg>
      <div className="flex justify-between mt-1">
        {data.map((d,i)=><span key={i} className="text-[10px] text-neutral-400">{d.label}</span>)}
      </div>
      {label && <p className="text-neutral-500 text-sm mt-2">{label}</p>}
    </div>
  );
}

// Parameter slider (interactive lever)
function ParameterSlider({ data, outputLabel }) {
  const [i, setI] = useState(0);
  const pt = data[i];
  const max = Math.max(...data.map(d => d.value));
  return (
    <div className="bg-white rounded-xl border p-6">
      <div className="flex justify-between text-xs text-neutral-500 mb-2"><span>{data[0].label} feature</span><span>{data[data.length-1].label} features</span></div>
      <input type="range" min="0" max={data.length-1} step="1" value={i} onChange={(e)=>setI(+e.target.value)} className="lever w-full" />
      <div className="mt-6 flex items-end gap-4">
        <p className="display text-6xl text-accent">{pt.value}<span className="text-2xl align-top">%</span></p>
        <p className="text-neutral-500 mb-3">{outputLabel} at <strong>{pt.label}</strong> feature{pt.label==='1'?'':'s'}</p>
      </div>
      <div className="mt-4 h-2.5 rounded-full bg-neutral-200 overflow-hidden"><div className="h-full bg-accent transition-all duration-200" style={{ width:`${(pt.value/max)*100}%` }} /></div>
    </div>
  );
}

// Before / after wipe
function BeforeAfter() {
  const [pos, setPos] = useState(50);
  return (
    <div>
      <div className="relative h-44 rounded-xl overflow-hidden border select-none">
        <div className="absolute inset-0 bg-neutral-200 grid place-items-center"><span className="heading text-2xl text-neutral-600">Before</span></div>
        <div className="absolute inset-0 bg-accent grid place-items-center overflow-hidden" style={{ width:`${pos}%` }}><span className="heading text-2xl text-white whitespace-nowrap">After</span></div>
        <div className="absolute top-0 bottom-0 w-0.5 bg-white" style={{ left:`${pos}%` }} />
      </div>
      <input type="range" min="0" max="100" value={pos} onChange={(e)=>setPos(+e.target.value)} className="lever w-full mt-4" />
    </div>
  );
}

// Horizontal carousel (snap)
function Carousel({ items }) {
  return (
    <div className="rib-scroll flex gap-4 overflow-x-auto snap-x snap-mandatory pb-3">
      {items.map((it, i) => (
        <div key={i} className="snap-center shrink-0 w-64 bg-white rounded-xl border p-5">
          <p className="kicker text-neutral-400">{i+1} / {items.length}</p>
          <p className="display text-4xl text-accent mt-2">{it.amt}</p>
          <p className="heading text-lg mt-2">{it.name}</p>
        </div>
      ))}
      <div className="shrink-0 w-1" />
    </div>
  );
}

// Tabs / segmented control
function Tabs({ tabs }) {
  const [t, setT] = useState(0);
  return (
    <div className="bg-white rounded-xl border overflow-hidden">
      <div className="flex border-b">{tabs.map((tb,i)=>(
        <button key={i} onClick={()=>setT(i)} className={"px-5 py-3 text-sm font-semibold border-b-2 -mb-px "+(t===i?'border-accent text-accent':'border-transparent text-neutral-500')}>{tb.l}</button>
      ))}</div>
      <div className="p-5 text-neutral-700">{tabs[t].c}</div>
    </div>
  );
}

// Click-to-expand cards
function ClickExpand({ items }) {
  const [open, setOpen] = useState(null);
  return (
    <div className="grid grid-cols-2 gap-3">
      {items.map((it, i) => (
        <button key={i} onClick={()=>setOpen(open===i?null:i)} className="text-left bg-white border rounded-xl p-4 hover:border-accent transition-colors">
          <div className="flex items-center justify-between"><span className="font-bold">{it.t}</span><span className="text-accent text-xl leading-none">{open===i?'−':'+'}</span></div>
          {open===i && <p className="mt-3 text-sm text-neutral-600">{it.d}</p>}
        </button>
      ))}
    </div>
  );
}

// Master-detail side panel
function MasterDetail({ items }) {
  const [sel, setSel] = useState(null);
  return (
    <div className="relative overflow-hidden rounded-xl border bg-white h-72">
      <div className="grid grid-cols-2 gap-3 p-4">
        {items.map((it,i)=>(
          <button key={i} onClick={()=>setSel(it)} className="text-left border rounded-lg p-4 hover:border-accent transition-colors"><span className="font-bold">{it.t}</span></button>
        ))}
      </div>
      <div className={"absolute top-0 right-0 h-full w-2/3 bg-white border-l shadow-2xl p-6 transition-transform duration-300 "+(sel?'translate-x-0':'translate-x-full')}>
        {sel && (<div>
          <button onClick={()=>setSel(null)} className="text-neutral-400 text-sm mb-3">✕ close</button>
          <h4 className="heading text-2xl">{sel.t}</h4>
          <p className="text-neutral-600 mt-3">{sel.d}</p>
        </div>)}
      </div>
    </div>
  );
}

// Overlay / modal
function ModalDemo() {
  const [o, setO] = useState(false);
  return (
    <div className="relative h-44 rounded-xl border bg-white grid place-items-center">
      <button onClick={()=>setO(true)} className="px-5 py-2.5 bg-accent text-white rounded-lg font-semibold text-sm">Open detail</button>
      {o && (
        <div className="absolute inset-0 bg-black/50 grid place-items-center" onClick={()=>setO(false)}>
          <div className="bg-white rounded-2xl p-6 w-3/4 max-w-sm" onClick={(e)=>e.stopPropagation()}>
            <h4 className="heading text-xl">Expansion Surface</h4>
            <p className="text-sm text-neutral-600 mt-2">The path from one product to two. The most direct lever on the retention cliff.</p>
            <button onClick={()=>setO(false)} className="mt-5 text-accent font-semibold text-sm">Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// Live component demo (notification that auto-dismisses)
function NotificationDemo() {
  const [toasts, setToasts] = useState([]);
  const fire = () => { const id = Date.now(); setToasts(t=>[...t,id]); setTimeout(()=>setToasts(t=>t.filter(x=>x!==id)), 3500); };
  return (
    <div className="relative h-64 rounded-xl border bg-white overflow-hidden grid place-items-center">
      <button onClick={fire} className="px-5 py-2.5 bg-accent text-white rounded-lg font-semibold text-sm">Trigger notification</button>
      <div className="absolute top-3 right-3 w-64 space-y-2">
        {toasts.map(id => (
          <div key={id} className="bg-black text-white rounded-lg p-3 shadow-xl" style={{ animation:'slidein .3s ease' }}>
            <strong className="text-sm">Action needed: complete setup</strong>
            <div className="text-neutral-300 text-xs mt-1">Finish your account configuration to avoid service interruption.</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Annotated screenshot (hotspots)
function Hotspots() {
  const [active, setActive] = useState(null);
  const spots = [
    {x:22,y:28,note:'Account overview — the first thing a user checks.'},
    {x:72,y:48,note:'Status indicator — surface the thing that needs attention.'},
    {x:44,y:78,note:'Recommended action — earned by utility, not forced.'}
  ];
  return (
    <div className="relative h-64 rounded-xl border overflow-hidden bg-gradient-to-br from-neutral-100 to-neutral-200">
      {spots.map((s,i)=>(
        <button key={i} onClick={()=>setActive(active===i?null:i)} style={{ left:s.x+'%', top:s.y+'%' }}
          className="absolute -translate-x-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-accent text-white text-xs font-bold grid place-items-center shadow-lg">{i+1}</button>
      ))}
      {active!==null && <div className="absolute bottom-3 left-3 right-3 bg-white rounded-lg p-3 text-sm shadow-lg">{spots[active].note}</div>}
    </div>
  );
}

// Scroll reveal (fade + slide up as element enters viewport)
function RevealItem({ children, delay = 0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'none' : 'translateY(14px)',
      transition: `opacity 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

/* ---------- gallery shell ---------- */
function Group({ title, children }) {
  return (<div className="mt-16"><h2 className="display text-3xl md:text-4xl mb-2">{title}</h2><div className="grid gap-8 mt-6">{children}</div></div>);
}

function PatternCard({ name, component, use, knobs, children }) {
  return (
    <section className="border border-neutral-200 rounded-2xl overflow-hidden bg-white">
      <div className="p-6 border-b border-neutral-100">
        <h3 className="heading text-2xl">{name}</h3>
        <p className="text-neutral-700 mt-2"><span className="font-semibold">Use for:</span> {use}</p>
        <p className="text-neutral-500 text-sm mt-1"><span className="font-semibold">Knobs:</span> {knobs}</p>
      </div>
      <div className="p-6 bg-neutral-50">{children}</div>
      <div className="px-6 py-3 text-xs text-neutral-400 border-t border-neutral-100">Component <code className="text-accent">&lt;{component}&gt;</code> — copy from this file's script block.</div>
    </section>
  );
}

function App() {
  const [k1, setK1] = useState(0), [k2, setK2] = useState(0), [k3, setK3] = useState(0), [k4, setK4] = useState(0);
  const drivers = [
    {name:'Activation Gaps', amt:'$284M'},
    {name:'Price Sensitivity', amt:'$241M'},
    {name:'Trust Barriers', amt:'$98M'},
  ];
  const initiatives = [
    {t:'Retention Offers', d:'Proactive interventions for at-risk accounts. Live; measuring impact on 30-day churn.'},
    {t:'Status Reframe', d:'Reframing negative-feeling system states into neutral or constructive ones. Directly addresses trust-driven drop-off.'},
    {t:'Expansion Surface', d:'A dedicated path from one product to two — the most direct lever on the adoption cliff.'},
    {t:'Signal System', d:'Rationalize notification volume into a governed system. The right message at the right moment, then out of the way.'},
  ];
  return (
    <main className="max-w-3xl mx-auto px-6 py-20">
      <p className="kicker text-accent">Living Prototype</p>
      <h1 className="display text-5xl md:text-6xl mt-3">Pattern storybook.</h1>
      <p className="mt-6 text-lg text-neutral-700">The menu of tried-and-true interactions. Every pattern below is running — drag it, click it, replay it. To use one in a prototype, ask for it by name or copy its component from this file. Patterns are copied in, not imported — every prototype stays one portable file. New patterns are added here only when they earn it.</p>

      <Group title="Reveal one thing">
        <PatternCard name="Metric reveal" component="MetricReveal" use="the one number that matters; counts up on view." knobs="value · decimals · prefix/suffix · duration">
          <div key={k1}><MetricReveal end={4.2} decimals={1} prefix="$" suffix="B" /></div>
          <p className="text-neutral-500 text-sm mt-1">Revenue at risk</p>
          <ReplayBtn onClick={()=>setK1(k1+1)} />
        </PatternCard>
        <PatternCard name="Scroll reveal" component="RevealItem" use="fade elements in as they enter the viewport — signals a new beat without animation for animation's sake. Wrap any block: a stat, a card, a row." knobs="delay (stagger between items) · threshold · distance · duration">
          <div key={k4} className="space-y-3">
            {[
              { label: 'Activation Gaps',   value: '$284M', note: 'Primary churn driver' },
              { label: 'Price Sensitivity',  value: '$241M', note: 'Second-largest lever' },
              { label: 'Trust Barriers',     value: '$98M',  note: 'Highest-effort fix'  },
            ].map((item, i) => (
              <RevealItem key={i} delay={i * 80}>
                <div className="bg-white rounded-xl border p-4 flex items-center justify-between">
                  <div>
                    <p className="font-semibold">{item.label}</p>
                    <p className="text-xs text-neutral-500 mt-0.5">{item.note}</p>
                  </div>
                  <p className="display text-2xl text-accent">{item.value}</p>
                </div>
              </RevealItem>
            ))}
          </div>
          <ReplayBtn onClick={()=>setK4(k4+1)} />
        </PatternCard>
      </Group>

      <Group title="Show change or a relationship">
        <PatternCard name="Animated bar chart" component="AnimatedChart" use="a distribution or cliff you want them to see drop; bars draw in on view." knobs="data · max · highlightIndex · valueSuffix">
          <div key={k2}><AnimatedChart data={ADOPTION} max={20} highlightIndex={0} /></div>
          <p className="text-neutral-500 text-sm mt-2">Retention rate by number of features adopted</p>
          <ReplayBtn onClick={()=>setK2(k2+1)} />
        </PatternCard>
        <PatternCard name="Line chart" component="LineChart" use="a trend over time; line draws left-to-right with area fill, dots appear as the line reaches them." knobs="data (label + value) · label · line color · area fill opacity">
          <div key={k3}><LineChart data={TREND} label="Monthly active rate (%)" /></div>
          <ReplayBtn onClick={()=>setK3(k3+1)} />
        </PatternCard>
        <PatternCard name="Parameter slider" component="ParameterSlider" use="let the audience drag an input and watch the outcome move — belief beats assertion." knobs="data (the points) · range · outputLabel · bar on/off">
          <ParameterSlider data={ADOPTION} outputLabel="annual churn" />
        </PatternCard>
        <PatternCard name="Before / after wipe" component="BeforeAfter" use="a direct two-state comparison — drag to reveal the new state." knobs="before label · after label · orientation · default split position">
          <BeforeAfter />
        </PatternCard>
      </Group>

      <Group title="Move through a set">
        <PatternCard name="Horizontal carousel" component="Carousel" use="a small set of equals you step through left-to-right." knobs="items · card width · snap · peek · arrows">
          <Carousel items={drivers} />
        </PatternCard>
        <PatternCard name="Tabs / segmented control" component="Tabs" use="switch between a few related views in place, no scroll." knobs="tabs (label + content) · default · style">
          <Tabs tabs={[
            {l:'Activation',c:'$284M in activation-driven drop-off. The case for an onboarding rework.'},
            {l:'Pricing',c:'$241M in price-sensitivity churn. The lever behind retention offers.'},
            {l:'Trust',c:'$98M from friction felt as risk. The case for the status reframe.'}
          ]} />
        </PatternCard>
      </Group>

      <Group title="Reveal more detail">
        <PatternCard name="Click-to-expand cards" component="ClickExpand" use="a grid where each item opens in place to show more." knobs="items (summary + detail) · single vs. multi-open">
          <ClickExpand items={initiatives} />
        </PatternCard>
        <PatternCard name="Master-detail side panel" component="MasterDetail" use="click an item; rich detail slides in from the right, context stays visible." knobs="items · panel width · slide direction">
          <MasterDetail items={initiatives} />
        </PatternCard>
        <PatternCard name="Overlay / modal" component="ModalDemo" use="focus fully on one item, dim the rest. Use sparingly — it breaks flow." knobs="content · backdrop dismiss · size">
          <ModalDemo />
        </PatternCard>
      </Group>

      <Group title="Show the real thing">
        <PatternCard name="Live component demo" component="NotificationDemo" use="show an actual experience behave — a notification that appears then auto-dismisses." knobs="the component · trigger (button/auto) · duration · position">
          <NotificationDemo />
        </PatternCard>
        <PatternCard name="Annotated screenshot" component="Hotspots" use="point at parts of a real screen; numbered hotspots reveal callouts on click." knobs="image · hotspots (x/y + note)">
          <Hotspots />
        </PatternCard>
      </Group>

      <p className="mt-20 text-sm text-neutral-400">Single-file prototypes · grow the library from real work.</p>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
